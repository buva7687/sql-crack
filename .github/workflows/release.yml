name: Release

# Fires automatically on every push to main. If package.json contains a version
# that has not been released yet (no matching git tag), it builds, creates the
# GitHub release/tag, then publishes the packaged VSIX to external registries.
#
# Marketplace / Open VSX publishing stays OFF unless the VSCE_PAT / OVSX_PAT
# repository secrets are configured. No secret values are ever written to logs.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether a release is needed
        id: check
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No tag for v$VERSION yet; a release will be created."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check.outputs.version }}
      TAG_NAME: v${{ needs.check.outputs.version }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Validate package version
        run: |
          set -euo pipefail
          node -e "
            const v = process.argv[1].split('.').map(Number);
            const min = [0, 3, 7];
            const valid = v.length === 3 && v.every(Number.isFinite);
            if (!valid) {
              console.error('Invalid semver version: ' + process.argv[1]);
              process.exit(1);
            }
            const cmp =
              v[0] - min[0] ||
              v[1] - min[1] ||
              v[2] - min[2];
            if (cmp < 0) {
              console.error('Release versions below v0.3.7 are not supported by this workflow.');
              process.exit(1);
            }
          " "$VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Run type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run performance gate
        run: npm run test:perf

      - name: Build extension
        run: npm run package

      - name: Package VSIX
        run: |
          npx @vscode/vsce package --out "sql-crack-${TAG_NAME}.vsix"

      - name: Create GitHub release and tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: sql-crack-${{ env.TAG_NAME }}.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: |
          npx @vscode/vsce publish --packagePath "sql-crack-${TAG_NAME}.vsix"

      - name: Skip VS Code Marketplace publish
        if: ${{ env.VSCE_PAT == '' }}
        run: echo "VSCE_PAT not configured; skipping VS Code Marketplace publish."

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: |
          npx ovsx publish "sql-crack-${TAG_NAME}.vsix"

      - name: Skip Open VSX publish
        if: ${{ env.OVSX_PAT == '' }}
        run: echo "OVSX_PAT not configured; skipping Open VSX publish."
